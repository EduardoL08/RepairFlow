<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RepairFlow — Assistência Técnica</title>

  <!-- ── CSS: carregados em ordem de dependência ──────────────── -->
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/modal.css" />
  <link rel="stylesheet" href="css/login.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>

<!-- ════════════════════════════════════════════════════════════
     LOGIN PAGE
════════════════════════════════════════════════════════════ -->
<div id="login-page">
  <div class="login-card">

    <div class="login-logo">
      <div class="login-logo-icon">⚡</div>
      <h1 class="login-logo-title">RepairFlow</h1>
      <p class="login-logo-sub">Sistema de Assistência Técnica</p>
    </div>

    <h2 class="login-title">Entrar na plataforma</h2>

    <div id="login-error" class="login-error"></div>

    <div class="form-group">
      <label class="form-label" for="input-email">E-mail</label>
      <input
        class="input"
        type="email"
        id="input-email"
        placeholder="seu@email.com"
        autocomplete="email"
      />
    </div>

    <div class="form-group">
      <label class="form-label" for="input-senha">Senha</label>
      <div class="input-group">
        <input
          class="input"
          type="password"
          id="input-senha"
          placeholder="••••••••"
          autocomplete="current-password"
        />
        <button
          class="input-eye"
          id="btn-toggle-senha"
          type="button"
          onclick="Auth.toggleSenha()"
          title="Mostrar/ocultar senha"
        >👁</button>
      </div>
    </div>

    <button class="btn-login" id="btn-login" onclick="Auth.login()">
      Entrar
    </button>

  </div>

  <p class="login-footer">RepairFlow © <span id="ano"></span></p>
</div>


<!-- ════════════════════════════════════════════════════════════
     APP SHELL
════════════════════════════════════════════════════════════ -->
<div id="app">

  <!-- ── Sidebar ─────────────────────────────────────────────── -->
  <aside class="sidebar">

    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">⚡</div>
      <span class="sidebar-logo-name">RepairFlow</span>
    </div>

    <nav class="sidebar-nav" id="sidebar-nav">
      <!-- Renderizado por app.js -->
    </nav>

    <div class="sidebar-footer">
      <div id="user-info">
        <!-- Renderizado por app.js -->
      </div>
      <button class="btn-logout" onclick="Auth.logout()">
        ⬅ Sair
      </button>
    </div>

  </aside>

  <!-- ── Main ────────────────────────────────────────────────── -->
  <main class="main">
    <div id="main-content">
      <!-- Conteúdo dinâmico injetado pelo router -->
    </div>
  </main>

</div>


<!-- ════════════════════════════════════════════════════════════
     MODAL — Formulário genérico (criar / editar)
════════════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="modal-form">
  <div class="modal-box">

    <div class="modal-header">
      <span class="modal-title" id="modal-title">Modal</span>
      <button class="modal-close" onclick="Modal.close('modal-form')">✕</button>
    </div>

    <div class="modal-body" id="modal-body">
      <!-- Corpo dinâmico -->
    </div>

    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="Modal.close('modal-form')">
        Cancelar
      </button>
      <button class="btn btn-primary" id="modal-save">
        Salvar
      </button>
    </div>

  </div>
</div>


<!-- ════════════════════════════════════════════════════════════
     MODAL — Atualizar status de ordem
════════════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="modal-status">
  <div class="modal-box">

    <div class="modal-header">
      <span class="modal-title" id="status-title">Atualizar Status</span>
      <button class="modal-close" onclick="Modal.close('modal-status')">✕</button>
    </div>

    <div class="modal-body" id="status-body">
      <!-- Corpo dinâmico -->
    </div>

    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="Modal.close('modal-status')">
        Cancelar
      </button>
      <button class="btn btn-primary" id="status-save">
        Atualizar
      </button>
    </div>

  </div>
</div>


<!-- ════════════════════════════════════════════════════════════
     MODAL — Confirmação de exclusão
════════════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="modal-confirm">
  <div class="modal-box modal-sm">

    <div class="modal-header">
      <span class="modal-title" id="confirm-title">Confirmar</span>
      <button class="modal-close" onclick="Modal.close('modal-confirm')">✕</button>
    </div>

    <div class="modal-body">
      <p id="confirm-message"
         style="color:var(--gray-600);font-size:.9375rem;line-height:1.6">
      </p>
    </div>

    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="Modal.close('modal-confirm')">
        Cancelar
      </button>
      <button class="btn btn-danger" id="confirm-ok">
        Remover
      </button>
    </div>

  </div>
</div>


<!-- ════════════════════════════════════════════════════════════
     TOAST CONTAINER
════════════════════════════════════════════════════════════ -->
<div id="toast-container"></div>


<!-- ════════════════════════════════════════════════════════════
     JAVASCRIPT — carregado em ordem de dependência
════════════════════════════════════════════════════════════ -->

<!-- 1. Configurações e constantes -->
<script src="js/config.js"></script>

<!-- 2. Estado global -->
<script src="js/store.js"></script>

<!-- 3. Cliente HTTP -->
<script src="js/api.js"></script>

<!-- 4. Helpers de UI -->
<script src="js/ui.js"></script>

<!-- 5. Autenticação -->
<script src="js/auth.js"></script>

<!-- 6. Páginas -->
<script src="js/pages/dashboard.js"></script>
<script src="js/pages/clientes.js"></script>
<script src="js/pages/equipamentos.js"></script>
<script src="js/pages/tecnicos.js"></script>
<script src="js/pages/ordens.js"></script>

<!-- 7. App principal (inicializa tudo) — SEMPRE por último -->
<script src="js/app.js"></script>

<script>
  // Ano no rodapé do login
  document.getElementById('ano').textContent = new Date().getFullYear();
</script>

</body>
</html>
