services:


  # MONGODB — Banco de dados
  
  mongodb:
    image: mongo:7.0
    container_name: assistencia_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: RepairFlow
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - assistencia_net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  
  # MONGO EXPRESS — Interface visual do banco
  
  mongo-express:
    image: mongo-express:1.0.2
    container_name: assistencia_mongo_express
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin123
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin123@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    ports:
      - "8081:8081"
    networks:
      - assistencia_net

  # BACKEND — API .NET 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: assistencia_backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      MongoDbSettings__ConnectionString: mongodb://admin:admin123@mongodb:27017/?authSource=admin
      MongoDbSettings__DatabaseName: RepairFlow
      JwtSettings__SecretKey: REPAIRFLOW_SECRET_KEY_CHANGE_IN_PRODUCTION_MIN_32
      JwtSettings__Issuer: RepairFlow.API
      JwtSettings__Audience: RepairFlow.Client
      JwtSettings__ExpirationHours: 8
      Cors__AllowedOrigins__0: http://localhost
      Cors__AllowedOrigins__1: http://localhost:80
    ports:
      - "5000:5000"
    networks:
      - assistencia_net

  
  # FRONTEND — HTML/CSS/JS servido por nginx

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: assistencia_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - assistencia_net

# VOLUMES E REDES

volumes:
  mongo_data:

networks:
  assistencia_net:
    driver: bridge