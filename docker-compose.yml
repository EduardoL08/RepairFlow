version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    container_name: repairflow_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: RepairFlow
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - repairflow_net

  mongo-express:
    image: mongo-express:1.0.2
    container_name: repairflow_mongo_express
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin123
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin123@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    ports:
      - "8081:8081"
    networks:
      - repairflow_net

volumes:
  mongo_data:

networks:
  repairflow_net:
    driver: bridge
